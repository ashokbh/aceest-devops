name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: "Build & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt flake8
      - run: flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: "Automated Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aceest-fitness:latest .
      - name: Run container health check
        run: |
          docker run -d --name aceest_test -p 5000:5000 aceest-fitness:latest
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop aceest_test
          docker rm aceest_test
